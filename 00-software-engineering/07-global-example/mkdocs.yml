site_name: TaskFlow Documentation
site_description: Plataforma interna de gestión de tareas para Lumen Studio
site_author: Lumen Studio Engineering
copyright: Copyright &copy; 2026 Lumen Studio

theme:
  name: material
  language: es
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Cambiar a modo oscuro
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Cambiar a modo claro

plugins:
  - search:
      lang: es
  - mermaid2

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:mermaid2.fence_mermaid_custom
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tasklist:
      custom_checkbox: true

nav:
  - Inicio: index.md
  - Producto:
    - Visión: 01-product/vision.md
    - Stakeholders: 01-product/stakeholders.md
    - Personas: 01-product/personas.md
    - Alcance: 01-product/scope.md
    - Glosario: 01-product/glossary.md
  - Requisitos:
    - Funcionales: 02-requirements/functional.md
    - No funcionales: 02-requirements/non-functional.md
    - Historias de usuario: 02-requirements/user-stories.md
    - Casos de uso: 02-requirements/use-cases.md
    - Trazabilidad: 02-requirements/traceability.md
